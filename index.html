<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>JowiAlchemyShield</title>

<link rel="stylesheet"
href="css/style.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>


<header class="header">

<div class="logo">

<div class="logo-icon">

🛡️

</div>

<div class="logo-text">

Jowi<span>AlchemyShield</span>

</div>

</div>

<div>

Session Active

</div>

</header>



<div class="container">


<!-- EMOTION -->

<div class="section">

<div class="section-title">

Emotion Check

</div>

<div class="section-sub">

How are you feeling?

</div>

<input

type="range"

id="mood"

class="mood-slider"

min="0"

max="100"

value="50">

<div
class="result-box orange show"
id="moodResult">

Neutral

</div>

</div>




<!-- LIVE PRICES -->

<div class="section">

<div class="section-title">

Live Crypto Prices

</div>

<div class="result-card">

<div class="result-row">

<span>BTC</span>

<span id="btcPrice">

Loading...

</span>

</div>

</div>

</div>




<!-- SIGNAL ENGINE -->

<div class="section">

<div class="section-title">

AI Trading Signals

</div>

<div class="section-sub">

Signal engine analysis

</div>

<div class="result-card">


<div class="result-row">

<span>

Signal

</span>

<span id="btcSignal">

Loading...

</span>

</div>


<div class="result-row">

<span>

Entry

</span>

<span id="btcEntry">

-

</span>

</div>


<div class="result-row">

<span>

Stop Loss

</span>

<span id="btcSL">

-

</span>

</div>


<div class="result-row">

<span>

Take Profit

</span>

<span id="btcTP">

-

</span>

</div>


</div>

</div>




<!-- RISK CALCULATOR -->

<div class="section">

<div class="section-title">

Risk Calculator

</div>


<div class="calc-grid">

<input
id="balance"
value="10000">

<select id="risk">

<option value="1">

1%

</option>

<option value="2" selected>

2%

</option>

<option value="3">

3%

</option>

</select>

<input
id="entry"
value="110660">

<input
id="stop"
value="108500">

</div>


<div class="result-card">

<div class="result-row">

<span>

Risk Amount

</span>

<span id="riskAmount">

-

</span>

</div>


<div class="result-row">

<span>

Position Size

</span>

<span id="position">

-

</span>

</div>


<div class="result-row">

<span>

TP

</span>

<span id="tp">

-

</span>

</div>

</div>

</div>




<button onclick="unlockTrade()">

Unlock Trading Terminal

</button>



</div>


<script src="js/script.js"></script>

</body>

</html>
