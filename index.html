<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JowiAlchemyShield</title>

<style>

:root{
--bg:#0a0e1a;
--card:#172030;
--text:#fff;
--muted:#94a3b8;
--green:#10b981;
--red:#ef4444;
--orange:#f59e0b;
--blue:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

h2{
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
background:#101827;
border:none;
color:white;
border-radius:10px;
}

button{
padding:15px 30px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

.proceed{
background:var(--green);
color:white;
width:100%;
font-weight:bold;
}

.proceed:disabled{
opacity:.4;
cursor:not-allowed;
}

.result{
padding:15px;
background:#101827;
border-radius:10px;
margin-top:10px;
}

.check{
padding:15px;
background:#101827;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
}

.check.active{
border:2px solid var(--green);
}

.lock{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.9);
}

.lock.show{
display:flex;
}

.lockCard{
background:var(--card);
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
}

.timer{
font-size:40px;
margin:20px 0;
color:var(--red);
}

.green{
color:var(--green);
}

.orange{
color:var(--orange);
}

.red{
color:var(--red);
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Emotion Check</h2>

<input
type="range"
min="0"
max="100"
value="50"
id="mood"
>

<p id="moodText">

Neutral

</p>

</div>


<div class="card">

<h2>Risk Calculator</h2>

<label>Balance</label>

<input id="balance" value="10000">

<label>Risk %</label>

<select id="risk">

<option>1</option>

<option selected>2</option>

<option>3</option>

</select>

<label>Entry</label>

<input id="entry" value="110660">

<label>Stop Loss</label>

<input id="stop" value="108500">

<div class="result">

<div>

Risk Amount:

<span id="riskAmount">

$0

</span>

</div>

<div>

Position Size:

<span id="position">

0

</span>

</div>

<div>

Take Profit:

<span id="tp">

0

</span>

</div>

</div>

</div>


<div class="card">

<h2>Checklist</h2>

<div class="check" data-id="1">

Stop loss set

</div>

<div class="check" data-id="2">

Risk below limit

</div>

<div class="check" data-id="3">

Not revenge trading

</div>

</div>


<button
class="proceed"
id="tradeBtn"
disabled>

Unlock Trading Terminal

</button>

</div>


<div class="lock" id="lock">

<div class="lockCard">

<h2>Trading Paused</h2>

<div class="timer" id="timer">

02:00:00

</div>

<button onclick="closeLock()">

OK

</button>

</div>

</div>


<script>

let lockInterval=null;

let state={

mood:50,

locked:false,

lockEnd:null,

checks:[false,false,false]

};

function save(){

localStorage.setItem(

"shield",

JSON.stringify(state)

);

}

function load(){

try{

const s=JSON.parse(

localStorage.getItem("shield")

);

if(s) state=s;

}catch{}

}

load();

const mood=document.getElementById("mood");

const moodText=document.getElementById("moodText");

mood.value=state.mood;

function updateMood(){

state.mood=parseInt(mood.value);

save();

if(state.mood<50){

moodText.innerHTML="<span class='green'>Calm</span>";

}

else if(state.mood<75){

moodText.innerHTML="<span class='orange'>Caution</span>";

}

else{

moodText.innerHTML="<span class='red'>Danger</span>";

if(!state.locked){

lockTrading();

}

}

checkReady();

}

mood.addEventListener(

"input",

updateMood

);

function lockTrading(){

state.locked=true;

state.lockEnd=

Date.now()+7200000;

save();

showLock();

}

function showLock(){

document

.getElementById("lock")

.classList.add("show");

updateTimer();

if(lockInterval)

clearInterval(lockInterval);

lockInterval=setInterval(

updateTimer,

1000

);

}

function updateTimer(){

let left=

state.lockEnd-Date.now();

if(left<=0){

clearInterval(lockInterval);

state.locked=false;

state.lockEnd=null;

save();

document

.getElementById("lock")

.classList.remove("show");

return;

}

let h=Math.floor(left/3600000);

let m=Math.floor((left%3600000)/60000);

let s=Math.floor((left%60000)/1000);

document.getElementById("timer")

.innerText=

`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

}

function closeLock(){

document

.getElementById("lock")

.classList.remove("show");

}

function calc(){

let bal=parseFloat(balance.value)||0;

let riskPct=parseFloat(risk.value)||0;

let entry=parseFloat(

document.getElementById("entry").value

)||0;

let stop=parseFloat(

document.getElementById("stop").value

)||0;

let riskMoney=

bal*riskPct/100;

let diff=Math.abs(

entry-stop

);

if(diff===0) return;

let size=riskMoney/diff;

document.getElementById(

"riskAmount"

).innerText=

"$"+riskMoney.toFixed(2);

document.getElementById(

"position"

).innerText=

size.toFixed(4);

document.getElementById(

"tp"

).innerText=

(entry+(diff*2)).toFixed(0);

}

["balance","risk","entry","stop"]

.forEach(id=>{

document

.getElementById(id)

.addEventListener(

"input",

calc

);

});

document

.querySelectorAll(".check")

.forEach(el=>{

let id=parseInt(

el.dataset.id

)-1;

if(state.checks[id])

el.classList.add(

"active"

);

el.onclick=()=>{

state.checks[id]=

!state.checks[id];

el.classList.toggle(

"active"

);

save();

checkReady();

};

});

function checkReady(){

let ready=

state.checks.every(

v=>v

)

&& !state.locked

&& state.mood<75;

document

.getElementById(

"tradeBtn"

).disabled=!ready;

}

document

.getElementById(

"tradeBtn"

)

.onclick=()=>{

alert(

"Trading Terminal Unlocked"

);

};

if(

state.locked &&

state.lockEnd>

Date.now()

){

showLock();

}

updateMood();

calc();

checkReady();

</script>

</body>
</html>
